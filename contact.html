<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uatarreu</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="98f2f406-4b9e-479f-af2a-d3e338d3b284"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> 
<body class="contact_body">
    <header>
        <div class="logo-container">
            <a href="#"><img src="img/Tom_Logo_White.png" id="logo" alt="Logo"></a>
        </div>
        <nav id="navbar_container" style="display: none;">
            <ul>
                <li><a href="index.html">home</a></li>
                <li><a href="graphic_design.html">graphic design</a></li>
                <!--<li><a href="">3d</a></li>-->
                <!--<li><a href="">music</a></li>-->
                <li><a href="aboutme.html">about me</a></li>
                <li><a href="contact.html">contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="contact_main">
        <div class="contact_container">
            <div class="contact_image">
                <img src="img/smiling-dog.gif" alt="Contact" />
            </div>
            <form class="contact_form" action="https://formspree.io/f/xpqonzao" method="post">
                <h4>Wanna get in touch?</h4>
                <p>Send me a message here and I'll get back to you, otherwise you can find me in the social media icons over there.</p>
                <input type="text" id="name" placeholder="name" name="name" required>
                <input type="email" id="email" placeholder="email" name="email" required>
                <textarea id="message" name="message" placeholder="message" rows="5" required></textarea>
                <button type="submit">Send</button>
                <div class="contact_social">
                    <a href="https://www.linkedin.com/in/tomas-nouman/" target="_blank" aria-label="LinkedIn"><img src="img/icons/linkedin.svg" alt="LinkedIn"></a>
                    <a href="https://www.instagram.com/noumandesign" target="_blank" aria-label="Instagram"><img src="img/icons/instagram.svg" alt="Instagram"></a>
                    <a href="https://www.behance.net/tomas-nouman" target="_blank" aria-label="Behance"><img src="img/icons/behance.svg" alt="Behance"></a>
                </div>
            </form>
        </div>
    </main>
    <script src="scripts/scripts.js"></script>
    <script>
  const form = document.querySelector('.contact_form');

  function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toast.style.cssText = `
      position: fixed;
      bottom: 0;
      right: 2rem;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 1rem 1.5rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 9999;
    `;

    const style = document.createElement('style');
    style.textContent = `
      @media (max-width: 600px) {
        .toast {
          right: 0 !important;
          left: 0 !important;
          bottom: 0 !important;
          border-left: none !important;
          border-right: none !important;
          border-bottom: none !important;
          text-align: center;
          font-size: 0.8rem;
        }
      }
    `;
    document.head.appendChild(style);
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.style.opacity = '1');
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const response = await fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    if (response.ok) {
      form.reset();
      showToast('message sent. i\'ll get back to you.');
    } else {
      showToast('something went wrong. try again.');
    }
  });
</script>

</body>
</html>
